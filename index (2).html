<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0D0D0D"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>VYUU</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    #splash { position: fixed; inset: 0; background: #0D0D0D; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s; }
  </style>
</head>
<body>
  <div id="splash">
    <div style="font-size:48px;line-height:1;letter-spacing:-0.02em;font-family:sans-serif">
      <span style="color:#FFE500">VY</span><span style="color:#1440E8">UU</span>
    </div>
  </div>
  <div id="root"></div>

  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Rubik+Dirt&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script type="text/babel" src="./VYUU.jsx"></script>
  <script>
    window.addEventListener('load', function() {
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 300);
      } catch(e) {
        console.error(e);
        document.getElementById('splash').innerHTML =
          '<div style="color:#FF6B6B;font-family:monospace;padding:20px;text-align:center;font-size:12px">ERROR: ' + e.message + '</div>';
      }
    });
  </script>
</body>
</html>
